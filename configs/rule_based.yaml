rule_based:
  repo_root: /data/robert/Rule-Planner
  python_bin: /data/robert/fail2drive/env/bin/python
  config: /data/robert/Rule-Planner/config_example.yaml
  device: cpu
  
  vlm:
    enabled: false


carla:
  output_dir: /data/robert/outputs/fail2drive/rule_based
  camera_width: 800
  camera_height: 600
  camera_fov: 100.0
  camera_x: 0.7
  camera_y: 0.0
  camera_z: 1.6
  attach_camera: false

  # Preset rigs: front_only | rap_4cam | full_6cam
  # Or override with an explicit list, e.g. cameras: [CAM_FRONT, CAM_FRONT_LEFT]
  camera_rig: front_only

  recording:
    enabled: true
    dir_name: recordings
    save_frames: true
    save_video: true
    save_front_video: true
    save_grid_video: true
    fps: 20
    frame_format: jpg
