rap:
  repo_root: /data/robert/RAP_navsim
  checkpoint: /data/robert/models/RAP_DINO_navsimv2.ckpt
  python_bin: /data/robert/fail2drive/env/bin/python
  device: cuda:7  # DrivoR/RAP planner (~1 GiB); shares GPU with starVLA
  image_scale: 0.4
  use_scene_rig_lidar2img: true
  nuplan_devkit_dir: /data/robert/DrivoR/nuplan-devkit

  # Pre-downloaded Hugging Face cache for DINOv3 backbone
  hf_home: /data/robert/models/hf
  hf_hub_cache: /data/robert/models/hf/hub
  transformers_cache: /data/robert/models/hf/hub
  hf_hub_offline: false
  transformers_offline: false

  vlm:
    enabled: true
    intervention_enabled: true
    camera_mode: front_only
    intervention_camera_mode: multiview
    scoring_camera_mode: front_only
    backend: local_transformers_subprocess
    model_id: Qwen/Qwen3-VL-8B-Instruct
    output_model_slug: qwen3-vl-8b-instruct
    device: cuda:6  
    force_cpu_offload: true
    python_bin: /data/robert/fail2drive/env_vlm/bin/python
    max_new_tokens: 300
    intervention_max_new_tokens: 256
    candidate_limit: 10
    timeout_sec: 1200.0
    intervention_timeout_sec: 1200.0
    save_debug_artifacts: true
    debug_dir_name: vlm_debug
    carry_previous_enabled: true
    carry_previous_min_path_m: 0.5
    carry_previous_min_points: 2
    adaptive_replan_mode: log_only
    latency_tracking_mode: full_timeline
    q_enabled: true
    q_switch_margin: 0.05
    q_weight_rap_score: 0.55
    q_weight_progress: 0.30
    q_weight_offcenter: 0.10
    q_weight_curvature: 0.08
    q_weight_shortplan: 0.18
    q_carry_score_decay: 0.0
    display_default_trajectories: false
    include_default_candidates: false

  rule_based_merge:
    enabled: false

carla:
  graphics_adapter: 5  # CARLA rendering (~3 GiB); GPU 1 also has VLLM
  output_dir: /data/robert/outputs/fail2drive/rap_vlm_intervention_4cam
  auto_run_id: true  # one output dir per route/scenario; re-runs overwrite
  overwrite_scenario_output: true
  scenarios_dir_name: scenarios
  camera_rig: 4cam
  predictions_dir: predictions
  longitudinal:
    mode: pid             # pid | raw
    max_speed: 20.1       # m/s cap on target speed (~45 mph)
    lookahead_time: 2.0   # s; window used to read the plan's intended cruise speed
    kp: 0.4
    ki: 0.05
    kd: 0.0
    feedforward_gain: 0.06  # throttle per m/s to hold speed against drag
    feedforward_const: 0.0
    integral_clamp: 1.0
    stop_speed: 0.3       # target below this -> brake
    throttle_gain: 1.0    # overall throttle scale (also used by mode: gain)
    brake_gain: 1.0
    debug: true           # log per-step speed diagnostics
  topdown_camera:
    width: 800
    height: 800
    z: 45.0
    fov: 90.0
    pitch: -90.0
  topdown_camera:
    width: 800
    height: 800
    z: 45.0
    fov: 90.0
    pitch: -90.0
  recording:
    enabled: true
    dir_name: recordings
    save_frames: false
    save_video: false
    save_front_video: false
    save_grid_video: false
    save_topdown_video: true
    fps: 20
