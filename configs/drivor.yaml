# DrivoR baseline for Fail2Drive/CARLA (argmax, no VLM)
drivor:
  repo_root: /data/robert/DrivoR
  checkpoint: /data/robert/DrivoR/weights/checkpoints/drivor_Nav1_25epochs.pth
  dino: /data/robert/DrivoR/weights/vit_small_patch14_reg4_dinov2.lvd142m
  config: /data/robert/DrivoR/navsim/planning/script/config/common/agent/drivoR.yaml
  python_bin: /data/robert/fail2drive/env/bin/python
  device: cuda

  vlm:
    enabled: false

  rule_based_merge:
    enabled: false

carla:
  output_dir: /data/robert/outputs/fail2drive/drivor
  auto_run_id: true  # one output dir per route/scenario; re-runs overwrite
  overwrite_scenario_output: true
  scenarios_dir_name: scenarios
  camera_rig: 4cam
  predictions_dir: predictions
  # Longitudinal (throttle/brake) controller. The LQR is used only for steering;
  # throttle/brake come from a speed PID that tracks a target speed read from the
  # plan, with a feed-forward term to overcome CARLA's drag.
  longitudinal:
    mode: pid             # pid | raw
    max_speed: 20.1       # m/s cap on target speed (~45 mph)
    lookahead_time: 2.0   # s; window used to read the plan's intended cruise speed
    kp: 0.4
    ki: 0.05
    kd: 0.0
    feedforward_gain: 0.06  # throttle per m/s to hold speed against drag
    feedforward_const: 0.0
    integral_clamp: 1.0
    stop_speed: 0.3       # target below this -> brake
    throttle_gain: 1.0    # overall throttle scale (also used by mode: gain)
    brake_gain: 1.0
    debug: true           # log per-step speed diagnostics
  topdown_camera:
    width: 800
    height: 800
    z: 45.0
    fov: 90.0
    pitch: -90.0
  recording:
    enabled: true
    dir_name: recordings
    save_frames: false
    save_video: false
    save_front_video: false
    save_grid_video: false
    save_topdown_video: true
    fps: 20
