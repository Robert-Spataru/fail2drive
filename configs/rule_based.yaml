rule_based:
  repo_root: /data/robert/Rule-Planner
  python_bin: /data/robert/fail2drive/env/bin/python
  config: /data/robert/Rule-Planner/config_example.yaml
  device: cpu
  
  vlm:
    enabled: false

carla:
  output_dir: /data/robert/outputs/fail2drive/rule_based
  auto_run_id: true  # one output dir per route/scenario; re-runs overwrite
  overwrite_scenario_output: true
  scenarios_dir_name: scenarios
  camera_rig: 4cam
  predictions_dir: predictions
  # control.mode: vehicle (8fe6a4f baseline) | ackermann (LQR acc_cmd -> m/s²)
  control:
    mode: ackermann
    max_speed: 20.1
    speed_horizon_sec: 0.5   # matches LQR discretization_time
    steer_horizon_sec: 0.5
    debug: true
  topdown_camera:
    width: 800
    height: 800
    z: 45.0
    fov: 90.0
    pitch: -90.0
  recording:
    enabled: true
    dir_name: recordings
    save_frames: false
    save_video: false
    save_front_video: false
    save_grid_video: false
    save_topdown_video: true
    fps: 20
